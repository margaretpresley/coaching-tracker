<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Micro Coaching 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky:    #0ea5e9;
      --sky2:   #0284c7;
      --sun:    #f59e0b;
      --sun2:   #d97706;
      --mint:   #10b981;
      --mint2:  #059669;
      --coral:  #f43f5e;
      --ink:    #1e293b;
      --body:   #475569;
      --muted:  #94a3b8;
      --border: #e2e8f0;
      --card:   #ffffff;
      --bg:     #f0f9ff;
      --radius: 18px;
      --shadow: 0 1px 4px rgba(14,165,233,.08), 0 4px 16px rgba(14,165,233,.07);
      --shadow-lg: 0 8px 32px rgba(14,165,233,.15), 0 2px 8px rgba(14,165,233,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, var(--sky) 0%, #38bdf8 100%);
      color: #fff;
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(14,165,233,.35);
    }
    .app-header .h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -.3px;
      color: #fff;
    }
    .app-header .sub {
      font-size: 12px;
      color: rgba(255,255,255,.75);
      margin-top: 1px;
      font-weight: 600;
    }
    .coach-pill {
      background: rgba(255,255,255,.22);
      border: 2px solid rgba(255,255,255,.4);
      border-radius: 99px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Nunito', sans-serif;
    }
    .coach-pill select {
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      outline: none;
      cursor: pointer;
    }
    .coach-pill select option { color: var(--ink); background: #fff; }

    /* ── Sync bar ── */
    .sync-bar {
      background: var(--mint);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      padding: 8px;
      display: none;
    }
    .sync-bar.show { display: block; }
    .sync-bar.error { background: var(--coral); }

    /* ── Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      display: flex;
      border-top: 2px solid #e0f2fe;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 20px rgba(14,165,233,.10);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 4px 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: color .2s;
      position: relative;
    }
    .nav-btn .icon { font-size: 24px; line-height: 1; transition: transform .2s; }
    .icon-wrap { position: relative; display: inline-block; }
    .nav-badge { position: absolute; top: -5px; right: -8px; background: #f43f5e; color: #fff; font-size: 10px; font-weight: 900; font-family: 'Nunito', sans-serif; min-width: 16px; height: 16px; border-radius: 99px; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; z-index: 10; }
    .nav-btn.active { color: var(--sky); }
    .nav-btn.active .icon { transform: scale(1.15); }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 3px;
      background: var(--sky);
      border-radius: 3px 3px 0 0;
    }

    /* ── Main ── */
    .main { padding: 18px 16px 100px; max-width: 900px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 14px;
      border: 1.5px solid #e0f2fe;
    }
    .card-title {
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Stat chips ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat-chip {
      border-radius: 16px;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .stat-chip .val {
      font-family: 'Nunito', sans-serif;
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
    }
    .stat-chip .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; opacity: .8; }
    .chip-sky   { background: #e0f2fe; color: #0369a1; }
    .chip-sun   { background: #fef3c7; color: #92400e; }
    .chip-coral { background: #ffe4e6; color: #9f1239; }

    /* ── Activity feed ── */
    .feed-item {
      border-left: 4px solid var(--sky);
      padding: 12px 14px;
      background: #f8faff;
      border-radius: 0 12px 12px 0;
      margin-bottom: 10px;
    }
    .feed-item .meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
    .feed-item .title { font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif; }
    .feed-item .imp { font-size: 13px; color: var(--body); margin-top: 3px; }
    .flag-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #fef3c7; color: #92400e;
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 99px; margin-top: 6px;
    }

    /* ── Teacher cards ── */
    .teacher-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
    .teacher-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      cursor: pointer;
      border: 2px solid #e0f2fe;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .teacher-card:hover { border-color: var(--sky); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .teacher-card .tc-name { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; margin-bottom: 3px; }
    .teacher-card .tc-meta { font-size: 13px; color: var(--body); margin-bottom: 12px; font-weight: 600; }
    .teacher-card .tc-goal {
      background: #e0f2fe; color: #0369a1;
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 800;
      padding: 5px 11px; border-radius: 99px;
      font-family: 'Nunito', sans-serif;
    }
    .teacher-card .tc-stats { font-size: 12px; color: var(--muted); margin-top: 12px; display: flex; justify-content: space-between; font-weight: 600; }
    .avail-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }
    .avail-now { background: var(--mint); box-shadow: 0 0 0 3px #d1fae5; }
    .avail-no  { background: #cbd5e1; }

    /* ── Forms ── */
    .form-group { margin-bottom: 18px; }
    .form-label {
      font-size: 13px; font-weight: 800; color: var(--body);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 7px; display: block;
      font-family: 'Nunito', sans-serif;
    }
    .form-input {
      width: 100%; padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 15px; color: var(--ink);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(14,165,233,.12); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Look-fors ── */
    .lookfor-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; background: #f8faff;
      border-radius: 12px; margin-bottom: 8px;
      border: 1.5px solid #e0f2fe;
    }
    .lookfor-text { flex: 1; font-size: 14px; font-weight: 600; line-height: 1.4; }
    .lookfor-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .lf-btn {
      padding: 7px 12px; border-radius: 9px; border: none;
      font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800;
      cursor: pointer; transition: all .15s;
      background: #f1f5f9; color: #94a3b8;
    }
    .lf-btn.yes    { background: #d1fae5; color: #065f46; }
    .lf-btn.partial{ background: #fef3c7; color: #92400e; }
    .lf-btn.no     { background: #fee2e2; color: #991b1b; }

    /* ── Impression selector ── */
    .imp-row { display: flex; gap: 10px; }
    .imp-btn {
      flex: 1; padding: 14px 8px; border-radius: 12px; border: 2px solid var(--border);
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
      background: #fff; cursor: pointer; transition: all .18s;
      text-align: center; line-height: 1.3;
    }
    .imp-btn.sel-strong  { background: #d1fae5; border-color: var(--mint); color: #065f46; }
    .imp-btn.sel-on      { background: #e0f2fe; border-color: var(--sky); color: #0369a1; }
    .imp-btn.sel-support { background: #fee2e2; border-color: var(--coral); color: #991b1b; }

    .imp-btn.sel-missed { background: #fef9c3; border-color: #ca8a04; color: #713f12; }


    /* ── Goal display ── */
    .goal-banner {
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border-radius: 14px; padding: 16px 18px; margin-bottom: 16px;
      border: 1.5px solid #7dd3fc;
    }
    .goal-banner .goal-num {
      font-size: 12px; font-weight: 800; color: #0369a1;
      text-transform: uppercase; letter-spacing: .5px;
      font-family: 'Nunito', sans-serif;
    }
    .goal-banner .goal-name {
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 900; color: #0c4a6e; margin-top: 3px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 14px 22px; border-radius: 12px; border: none;
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
      cursor: pointer; transition: all .18s;
    }
    .btn-primary { background: var(--sky); color: #fff; }
    .btn-primary:hover { background: var(--sky2); box-shadow: 0 4px 16px rgba(14,165,233,.4); transform: translateY(-1px); }
    .btn-secondary { background: #f1f5f9; color: var(--ink); }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-ghost { background: transparent; color: var(--sky); padding: 10px 14px; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 9px 14px; font-size: 13px; border-radius: 9px; }
    .btn-danger { background: #fee2e2; color: var(--coral); }
    .btn-sun { background: var(--sun); color: #fff; }
    .btn-sun:hover { background: var(--sun2); box-shadow: 0 4px 16px rgba(245,158,11,.4); }

    /* ── Schedule ── */
    .now-header {
      display: flex; align-items: center; gap: 9px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 800; color: var(--mint2);
      margin-bottom: 12px;
    }
    .now-pulse {
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--mint);
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,.5); }
      50% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    }
    .avail-chip {
      display: flex; align-items: center; gap: 12px;
      background: #f0fdf4; border: 2px solid #a7f3d0;
      border-radius: 14px; padding: 13px 16px; margin-bottom: 10px;
      cursor: pointer; transition: all .2s;
    }
    .avail-chip:hover { border-color: var(--mint); box-shadow: 0 4px 12px rgba(16,185,129,.15); transform: translateY(-1px); }
    .avail-chip .ac-name { font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif; }
    .avail-chip .ac-meta { font-size: 12px; color: var(--body); font-weight: 600; }
    .avail-chip .ac-time { font-size: 13px; color: var(--mint2); font-weight: 800; margin-left: auto; font-family: 'Nunito', sans-serif; }

    /* ── Teacher detail ── */
    .obs-entry {
      border-left: 4px solid var(--sky);
      padding: 14px 16px; background: #f8faff;
      border-radius: 0 14px 14px 0; margin-bottom: 12px;
    }
    .obs-entry .oe-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 5px; }
    .obs-entry .oe-date { font-size: 12px; color: var(--muted); font-weight: 700; }
    .obs-entry .oe-goal { font-size: 12px; font-weight: 800; background: #e0f2fe; color: #0369a1; padding: 3px 9px; border-radius: 99px; font-family: 'Nunito', sans-serif; }
    .obs-entry .oe-glow { font-size: 14px; margin-bottom: 5px; font-weight: 600; }
    .obs-entry .oe-grow { font-size: 14px; color: var(--sky2); font-weight: 600; }
    .obs-entry .oe-note { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 5px; }

    /* ── Analytics ── */
    .insight-card {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius); padding: 20px;
      margin-bottom: 14px; border: 1.5px solid #fcd34d;
    }
    .insight-card .ic-label { font-size: 12px; font-weight: 800; color: #92400e; text-transform: uppercase; letter-spacing: .5px; font-family: 'Nunito', sans-serif; }
    .insight-card .ic-text  { font-size: 15px; color: #78350f; margin-top: 7px; line-height: 1.6; font-weight: 600; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .bar-label { font-size: 13px; font-weight: 700; min-width: 65px; }
    .bar-track { flex: 1; background: #e0f2fe; border-radius: 99px; height: 10px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; background: var(--sky); transition: width .6s cubic-bezier(.4,0,.2,1); }
    .bar-count { font-size: 13px; font-weight: 800; color: var(--body); min-width: 24px; text-align: right; }

    /* ── Empty states ── */
    .empty { text-align: center; padding: 44px 20px; color: var(--muted); }
    .empty .e-icon { font-size: 52px; margin-bottom: 14px; }
    .empty p { font-size: 15px; line-height: 1.6; font-weight: 600; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.4);
      z-index: 200; display: none; align-items: flex-end;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 10px 20px 44px;
      max-height: 88vh; overflow-y: auto;
      animation: slideUp .28s cubic-bezier(.4,0,.2,1);
      border-top: 3px solid #e0f2fe;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 44px; height: 5px; background: #e0f2fe; border-radius: 99px; margin: 14px auto 20px; }
    .modal-title { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 22px; color: var(--ink); }

    /* ── Config banner ── */
    .config-banner {
      background: #fffbeb; border: 2px solid #fcd34d;
      border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
    }
    .config-banner p { font-size: 14px; color: #92400e; line-height: 1.6; font-weight: 600; }
    .config-banner code { font-size: 12px; background: #fef3c7; padding: 2px 6px; border-radius: 5px; }

    .section-title {
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 900; color: var(--muted);
      text-transform: uppercase; letter-spacing: .7px;
      margin-bottom: 12px; margin-top: 20px;
    }
    .section-title:first-child { margin-top: 0; }

    .checkbox-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0;
    }
    .checkbox-row input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--sky); cursor: pointer; flex-shrink: 0; }
    .checkbox-row label { font-size: 15px; font-weight: 700; cursor: pointer; }

    .days-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .day-toggle {
      padding: 8px 14px; border-radius: 10px; border: 2px solid var(--border);
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
      background: #fff; cursor: pointer; transition: all .15s;
    }
    .day-toggle.on { background: var(--sky); border-color: var(--sky); color: #fff; }

    .back-btn {
      display: flex; align-items: center; gap: 7px;
      color: var(--sky); font-size: 15px; font-weight: 800;
      background: none; border: none; cursor: pointer;
      padding: 0 0 18px; font-family: 'Nunito', sans-serif;
    }
    .back-btn:hover { color: var(--sky2); }

    .divider { border: none; border-top: 2px solid #e0f2fe; margin: 18px 0; }

    .goal-progress { display: flex; gap: 5px; margin-top: 10px; }
    .gp-step { flex: 1; height: 6px; border-radius: 99px; background: #e0f2fe; }
    .gp-step.done { background: var(--mint); }
    .gp-step.current { background: var(--sun); }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .imp-btn { font-size: 12px; padding: 12px 5px; }
    }

    /* ── AI Alerts ── */
    .alerts-panel { margin-bottom: 14px; }
    .alert-card {
      border-radius: 14px; padding: 14px 16px;
      margin-bottom: 10px; display: flex; gap: 13px; align-items: flex-start;
      border: 2px solid transparent; cursor: pointer; transition: box-shadow .18s;
    }
    .alert-card:hover { box-shadow: var(--shadow-lg); }
    .alert-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-title { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; margin-bottom: 2px; }
    .alert-sub   { font-size: 12px; font-weight: 600; line-height: 1.4; opacity: .85; }
    .alert-action { font-size: 11px; font-weight: 800; margin-top: 5px; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; font-family: 'Nunito', sans-serif; }
    .alert-overdue  { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    .alert-stuck    { background: #fef9c3; border-color: #fde047; color: #854d0e; }
    .alert-decline  { background: #fff1f2; border-color: #fecdd3; color: #9f1239; }
    .alert-lookfor  { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
    .alert-schedule { background: #f0f9ff; border-color: #bae6fd; color: #0c4a6e; }
    .alert-flag     { background: #faf5ff; border-color: #e9d5ff; color: #6b21a8; }
    .alerts-empty { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-radius: 14px; padding: 16px 18px; display: flex; gap: 12px; align-items: center; border: 2px solid #bbf7d0; margin-bottom: 14px; }
    .alerts-empty .ae-icon { font-size: 28px; }
    .alerts-empty .ae-text { font-size: 14px; font-weight: 700; color: #166534; font-family: 'Nunito', sans-serif; }
    .alerts-empty .ae-sub  { font-size: 12px; color: #16a34a; font-weight: 600; margin-top: 2px; }
    .alert-badge {
      background: var(--coral); color: #fff;
      font-size: 11px; font-weight: 900;
      font-family: 'Nunito', sans-serif;
      min-width: 20px; height: 20px; border-radius: 99px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 5px; margin-left: 6px; vertical-align: middle;
    }


    /* ── Priority badges on teacher cards ── */
    .priority-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 900;
      padding: 3px 9px; border-radius: 99px; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .pb-urgent  { background: #fff1f2; color: #9f1239; border: 1.5px solid #fecdd3; }
    .pb-overdue { background: #fff7ed; color: #9a3412; border: 1.5px solid #fed7aa; }

// Normalize time field — handles Google Sheets serial decimals, H:MM, HH:MM, 12h strings
function normalizeTime(val) {
  if (!val && val !== 0) return '';
  const s = String(val).trim();
  // ISO date string from Sheets e.g. "1899-12-30T08:30:00.000Z"
  if (s.includes('T') && s.includes('Z')) {
    const d = new Date(s);
    const h = d.getUTCHours();
    const m = d.getUTCMinutes();
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  // Numeric fraction e.g. 0.3333 (8:00 AM)
  const num = parseFloat(s);
  if (!isNaN(num) && s.indexOf(':') === -1) {
    const totalMins = Math.round(num * 24 * 60);
    const h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  // Plain HH:MM or H:MM string — only use first two parts
  const parts = s.split(':');
  if (parts.length >= 2) {
    const h = parseInt(parts[0]);
    const m = parseInt(parts[1]);
    if (!isNaN(h) && !isNaN(m)) {
      return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    }
  }
  return s;
}

function normalizeData() {
  // Fix availability times on teachers
  state.teachers.forEach(t => {
    // Normalize legacy single window
    if (t.availabilityStart) t.availabilityStart = normalizeTime(t.availabilityStart);
    if (t.availabilityEnd)   t.availabilityEnd   = normalizeTime(t.availabilityEnd);
    // Normalize multi-window array
    if (t.availabilityWindows) {
      if (typeof t.availabilityWindows === 'string') {
        try { t.availabilityWindows = JSON.parse(t.availabilityWindows); } catch(e) { t.availabilityWindows = []; }
      }
      t.availabilityWindows = (t.availabilityWindows || []).map(function(w) { return { start: normalizeTime(w.start), end: normalizeTime(w.end) }; }).filter(function(w) { return w.start && w.end; });
      // Migrate legacy to windows if windows empty
      if (!t.availabilityWindows.length && t.availabilityStart && t.availabilityEnd) {
        t.availabilityWindows = [{ start: t.availabilityStart, end: t.availabilityEnd }];
      }
    } else if (t.availabilityStart && t.availabilityEnd) {
      t.availabilityWindows = [{ start: t.availabilityStart, end: t.availabilityEnd }];
    }
  });

  // Build name→id map from teachers
  const nameToId = {};
  state.teachers.forEach(t => {
    nameToId[String(t.name).trim().toLowerCase()] = t.id;
  });

  // Fix observations where teacherId doesn't match any teacher — link by teacherName
  const validIds = new Set(state.teachers.map(t => String(t.id)));
  state.observations.forEach(o => {
    if (!validIds.has(String(o.teacherId))) {
      const key = String(o.teacherName || '').trim().toLowerCase();
      if (nameToId[key]) o.teacherId = nameToId[key];
    }
  });
}

    state.observations = data.observations || [];
    normalizeData();
    localSave();
    state.lastSync = new Date();
    document.getElementById('syncStatus').textContent = '● live · ' + state.lastSync.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    showSync('✓ Synced with Google Sheets');
  } catch(e) {
    document.getElementById('syncStatus').textContent = '⚠ sync failed';
    showSync('Sync failed — using local data', true);
    localLoad();
  }
}


// ══════════════════════════════════════════════════════
// AI ENGINE (Anthropic API)
// ══════════════════════════════════════════════════════
let dailyBriefCache = { date: null, text: null, loading: false };
let goalReadinessCache = {}; // teacherId -> {text, loading}

async function callClaude(prompt, maxTokens) {
  maxTokens = maxTokens || 200;
  if (!USE_SHEETS || !SCRIPT_URL) {
    showSync('AI needs Sheets backend connected', true);
    return '';
  }
  try {
    showSync('Calling AI...');
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'claudeProxy',
        prompt: prompt,
        maxTokens: maxTokens
      })
    });
    const raw = await res.text();
    let data;
    try { data = JSON.parse(raw); }
    catch(e) { showSync('Bad response: ' + raw.slice(0, 80), true); return ''; }
    if (data.error) { showSync('AI error: ' + data.error.slice(0, 80), true); return ''; }
    if (!data.text) { showSync('AI returned empty response', true); return ''; }
    showSync('✓ AI response received');
    return data.text;
  } catch(e) {
    showSync('AI call failed: ' + e.message.slice(0, 80), true);
    return '';
  }
}

async function loadDailyBrief() {
  const today = toDateStr(new Date());
  if (dailyBriefCache.date === today && dailyBriefCache.text) return;
  if (dailyBriefCache.loading) return;
  if (state.observations.length < 3) return;

  dailyBriefCache.loading = true;
  dailyBriefCache.date = today;
  dailyBriefCache.text = null;
  render(); // show loading state

  const realObs = state.observations.filter(o => !o.missed && o.impression !== 'Missed visit');
  const flagged = getFlaggedTeachers().map(t => t.name);
  const gaps = getPersistentGapTeachers().map(g => g.teacher.name + ' (' + g.lookFor + ')');
  const overdue = state.teachers.filter(t => {
    const tObs = realObs.filter(o => o.teacherId == t.id);
    if (!tObs.length) return true;
    const last = tObs.sort((a,b) => new Date(b.date)-new Date(a.date))[0];
    return daysSince(last.date) > 14;
  }).map(t => t.name);

  const recentTrends = state.teachers.map(t => {
    const tObs = realObs.filter(o => o.teacherId == t.id)
      .sort((a,b) => new Date(a.date)-new Date(b.date)).slice(-3);
    if (tObs.length < 2) return null;
    const prev = IMPRESSION_SCORE[tObs[tObs.length-2].impression] || 2;
    const curr = IMPRESSION_SCORE[tObs[tObs.length-1].impression] || 2;
    if (curr > prev) return t.name + ' (trending up)';
    return null;
  }).filter(Boolean);

  const prompt = `You are a coaching support assistant for two instructional coaches (Dr. Presley and Mrs. Rickett) at an elementary school. Write a brief, warm, professional daily coaching brief for today (${today}). Be specific and actionable. Use plain sentences, no bullet points, no headers. Keep it to 3-4 sentences max.

Here is the current caseload data:
- Total teachers: ${state.teachers.length}
- Observations this week: ${realObs.filter(o => isThisWeek(o.date)).length}
- Flagged for follow-up: ${flagged.length > 0 ? flagged.join(', ') : 'none'}
- Persistent look-for gaps: ${gaps.length > 0 ? gaps.join('; ') : 'none'}
- Overdue for visit (14+ days): ${overdue.length > 0 ? overdue.slice(0,4).join(', ') + (overdue.length > 4 ? ' and ' + (overdue.length-4) + ' more' : '') : 'none'}
- Positive trends: ${recentTrends.length > 0 ? recentTrends.join(', ') : 'none noted'}

Write the brief now:`;

  const text = await callClaude(prompt, 250);
  dailyBriefCache.text = text;
  dailyBriefCache.loading = false;
  render();
}

async function loadGoalReadiness(teacherId) {
  if (goalReadinessCache[teacherId]?.text || goalReadinessCache[teacherId]?.loading) return;
  const t = state.teachers.find(x => x.id == teacherId);
  if (!t) return;
  const realObs = state.observations
    .filter(o => o.teacherId == teacherId && !o.missed && o.impression !== 'Missed visit')
    .sort((a,b) => new Date(a.date)-new Date(b.date));
  if (realObs.length < 3) return; // need at least 3

  const goals = GOALS[t.gradeBand] || [];
  const goalObj = goals.find(g => g.id === parseInt(t.currentGoal || 1));
  if (!goalObj) return;
  const nextGoal = goals.find(g => g.id === parseInt(t.currentGoal || 1) + 1);
  if (!nextGoal) return; // already at last goal

  goalReadinessCache[teacherId] = { loading: true, text: null };

  const last3 = realObs.slice(-3);
  const obsDetails = last3.map(o => {
    let r = o.lookForResponses || {};
    if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e) { r = {}; } }
    const lfSummary = goalObj.lookFors.map((lf, i) => lf + ': ' + (r[i] || 'not rated')).join(', ');
    return 'Date: ' + o.date + ', Impression: ' + o.impression + ', Look-fors: ' + lfSummary + ', Grow: ' + o.grow;
  }).join('\n');

  const prompt = `You are an instructional coaching assistant. Based on the last 3 observations for a teacher, assess whether they show readiness to advance to the next coaching goal. Be brief (1-2 sentences max), warm, and honest. Start with either "Ready to advance:" or "Not yet ready:" or "Showing progress:".

Teacher: ${t.name}
Current goal: Goal ${t.currentGoal} -- ${goalObj.name}
Next goal would be: Goal ${nextGoal.id} -- ${nextGoal.name}

Last 3 observations:
${obsDetails}

Your assessment:`;

  const text = await callClaude(prompt, 120);
  goalReadinessCache[teacherId] = { loading: false, text };
  render();
}


async function generateNewsletter() {
  if (newsletterCache.loading) return;
  newsletterCache.loading = true;
  newsletterCache.text = null;
  render();

  const realObs = state.observations.filter(o => !o.missed && o.impression !== 'Missed visit');
  const weekObs = realObs.filter(o => isThisWeek(o.date));

  // Goal advances this week
  const advances = [];
  state.teachers.forEach(t => {
    const tObs = realObs.filter(o => o.teacherId == t.id).sort((a,b) => new Date(a.date)-new Date(b.date));
    const weekTObs = tObs.filter(o => isThisWeek(o.date));
    if (weekTObs.length >= 2) {
      const first = weekTObs[0], last = weekTObs[weekTObs.length-1];
      if (parseInt(last.goalNumber) > parseInt(first.goalNumber)) {
        const goals = GOALS[t.gradeBand] || [];
        const newGoal = goals.find(g => g.id === parseInt(last.goalNumber));
        advances.push(t.name + ' advanced to Goal ' + last.goalNumber + (newGoal ? ' (' + newGoal.name + ')' : ''));
      }
    }
  });

  // Strong start teachers this week
  const strongTeachers = [];
  state.teachers.forEach(t => {
    const tWeek = weekObs.filter(o => o.teacherId == t.id);
    if (tWeek.some(o => o.impression === 'Strong start')) {
      strongTeachers.push({ name: t.name, glow: tWeek.find(o => o.impression === 'Strong start')?.glow || '' });
    }
  });

  // Building-wide look-for trends (positive = mostly Yes/Partial)
  const lfYes = {}, lfNo = {};
  weekObs.forEach(o => {
    let r = o.lookForResponses || {};
    if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e) { return; } }
    const goals = GOALS[state.teachers.find(t => t.id == o.teacherId)?.gradeBand] || [];
    const goal = goals.find(g => g.id === parseInt(o.goalNumber));
    if (!goal) return;
    Object.entries(r).forEach(([idx, val]) => {
      const lf = goal.lookFors[parseInt(idx)];
      if (!lf) return;
      if (val === 'Yes') lfYes[lf] = (lfYes[lf]||0) + 1;
      if (val === 'No')  lfNo[lf]  = (lfNo[lf]||0)  + 1;
    });
  });
  const topPositive = Object.entries(lfYes).sort((a,b) => b[1]-a[1]).slice(0,2).map(([lf]) => lf);
  const topGrowth   = Object.entries(lfNo).sort((a,b) => b[1]-a[1]).slice(0,2).map(([lf]) => lf);

  const impressionCounts = { 'Strong start': 0, 'On track': 0, 'Support needed': 0 };
  weekObs.forEach(o => { if (impressionCounts[o.impression] !== undefined) impressionCounts[o.impression]++; });

  const weekStr = startOfThisWeek().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  const prompt = `You are helping two instructional coaches write a warm, celebratory Friday newsletter summary for their elementary school teaching staff. The newsletter is sent Monday morning, so it should look ahead with encouragement. Write in a warm, professional, human tone. Use short paragraphs. Include these sections:

1. A brief opening celebrating the week (1-2 sentences)
2. Teacher shoutouts (use the data below -- be specific and name teachers)
3. Positive trends we're seeing across the building
4. One area for growth with 2-3 concrete instructional strategies teachers can try

Week of: ${weekStr}
Total observations this week: ${weekObs.length}
Impressions: ${impressionCounts['Strong start']} Strong start, ${impressionCounts['On track']} On track, ${impressionCounts['Support needed']} Support needed
Goal advances this week: ${advances.length > 0 ? advances.join('; ') : 'none'}
Teachers with Strong start observations: ${strongTeachers.length > 0 ? strongTeachers.map(t => t.name + (t.glow ? ' (' + t.glow.slice(0,60) + ')' : '')).join('; ') : 'none noted'}
Building-wide strengths (most common Yes look-fors): ${topPositive.length > 0 ? topPositive.join(', ') : 'not enough data'}
Area for growth (most common No look-fors): ${topGrowth.length > 0 ? topGrowth.join(', ') : 'not enough data'}

Write the newsletter now. Do not include headers like "Section 1" -- just write naturally. Keep it under 300 words.`;

  const text = await callClaude(prompt, 500);
  newsletterCache.text = text;
  newsletterCache.loading = false;
  newsletterCache.weekOf = weekStr;
  render();
}

function copyNewsletter() {
  const el = document.getElementById('newsletter-text');

  el.select();
  el.setSelectionRange(0, 99999);
  try {
    navigator.clipboard.writeText(el.value).then(() => showSync('Copied!')).catch(() => { document.execCommand('copy'); showSync('Copied!'); });
  } catch(e) { document.execCommand('copy'); showSync('Copied!'); }
}

async function generateObsSummary(obs, teacher, goal) {
  const realObs = state.observations
    .filter(o => o.teacherId == teacher.id && !o.missed && o.impression !== 'Missed visit')
    .sort((a,b) => new Date(a.date)-new Date(b.date));

  let r = obs.lookForResponses || {};
  if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e) { r = {}; } }
  const lfSummary = goal ? goal.lookFors.map((lf, i) => lf + ': ' + (r[i] || 'not rated')).join('; ') : '';

  const historyNote = realObs.length > 1
    ? 'Previous impressions: ' + realObs.slice(-3, -1).map(o => o.impression).join(', ')
    : 'This is their first observation.';

  const prompt = `You are an instructional coach writing a private one-line coaching note (not shared with the teacher). Write exactly one sentence summarizing the coaching trend or key observation. Be specific, professional, and coach-focused. Do not start with the teacher name.

Teacher: ${teacher.name}, Goal ${obs.goalNumber}
Today's impression: ${obs.impression}
Look-fors: ${lfSummary}
Glow: ${obs.glow}
Grow: ${obs.grow}
${historyNote}

One-line private coaching note:`;

  return await callClaude(prompt, 80);
}

// AVAILABILITY HELPERS
// ══════════════════════════════════════════════════════
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];


function getTeacherWindows(t) {
  // New format: availabilityWindows = [{start,end},{start,end},...]
  if (t.availabilityWindows && t.availabilityWindows.length) {
    return t.availabilityWindows.filter(w => w.start && w.end);
  }
  // Legacy single window fallback
  if (t.availabilityStart && t.availabilityEnd) {
    return [{ start: t.availabilityStart, end: t.availabilityEnd }];
  }
  return [];
}

function isAvailableNow(teacher) {
  const now = new Date();
  const dayName = DAYS[now.getDay()];
  const days = (teacher.availableDays || 'Mon,Tue,Wed,Thu,Fri').split(',').map(d => d.trim());
  if (!days.includes(dayName)) return false;
  const windows = getTeacherWindows(teacher);
  if (!windows.length) return false;
  const nowMins = now.getHours() * 60 + now.getMinutes();
  return windows.some(w => {
    const [sh, sm] = w.start.split(':').map(Number);
    const [eh, em] = w.end.split(':').map(Number);
    return nowMins >= sh * 60 + sm && nowMins <= eh * 60 + em;
  });
}

function isAvailableAtTime(teacher, timeStr, dayStr) {
  const days = (teacher.availableDays || 'Mon,Tue,Wed,Thu,Fri').split(',').map(d => d.trim());
  if (!days.includes(dayStr)) return false;
  const start = teacher.availabilityStart;
  const end = teacher.availabilityEnd;
  if (!start || !end || !timeStr) return false;
  const [th, tm] = timeStr.split(':').map(Number);
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  const t = th * 60 + tm, s = sh * 60 + sm, e = eh * 60 + em;
  return t >= s && t <= e;
}


function isFlaggedTeacher(teacherId) {
  // A teacher is flagged if their most recent real observation has followUpNeeded=true
  // AND no subsequent unflagged observation has been logged
  const tObs = state.observations
    .filter(o => o.teacherId == teacherId && !o.missed && o.impression !== 'Missed visit')
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  if (!tObs.length) return false;
  const last = tObs[tObs.length - 1];
  return last.followUpNeeded === true || last.followUpNeeded === 'TRUE';
}

function getFlaggedTeachers() {
  return state.teachers.filter(t => isFlaggedTeacher(t.id));
}

function getPersistentGapTeachers() {
  // Returns [{teacher, lookFor, count}] for teachers with 2+ No on same look-for
  const result = [];
  state.teachers.forEach(t => {
    const tObs = state.observations
      .filter(o => o.teacherId == t.id && !o.missed && o.impression !== 'Missed visit')
      .sort((a,b) => new Date(a.date) - new Date(b.date))
      .slice(-4);
    if (tObs.length < 2) return;
    const goals = GOALS[t.gradeBand] || [];
    const goalObj = goals.find(g => g.id === parseInt(t.currentGoal || 1));
    if (!goalObj) return;
    let worstLF = null, worstCount = 0;
    goalObj.lookFors.forEach((lf, idx) => {
      const responses = tObs.map(o => {
        const r = o.lookForResponses;
        if (!r) return null;
        try { return typeof r === 'string' ? JSON.parse(r)[idx] : r[idx]; } catch(e) { return null; }
      }).filter(Boolean);
      const noCount = responses.filter(r => r === 'No').length;
      if (noCount >= 2 && noCount > worstCount) { worstCount = noCount; worstLF = lf; }
    });
    if (worstLF) result.push({ teacher: t, lookFor: worstLF, count: worstCount });
  });
  return result;
}

async function resolveFlag(teacherId) {
  const t = state.teachers.find(x => x.id == teacherId);
  if (!t) return;
  if (!confirm('Mark flag as resolved for ' + t.name + '?')) return;
  // Find most recent flagged observation and clear it
  const tObs = state.observations
    .filter(o => o.teacherId == teacherId && !o.missed)
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  const flagged = tObs.find(o => o.followUpNeeded === true || o.followUpNeeded === 'TRUE');
  if (flagged) {
    flagged.followUpNeeded = false;
    if (USE_SHEETS) { await apiPost('updateObservation', flagged); showSync('✓ Flag resolved'); }
    localSave();
    render();
  }
}

  const done = seenToday(t.id);

function seenToday(teacherId) {
  const today = toDateStr(new Date());
  return state.observations.some(o => o.teacherId == teacherId && o.date === today);
}

function fmtCoachTitle(coach) {
  if (!coach) return '';
  if (coach === 'Presley') return 'Dr. Presley';
  if (coach === 'Rickett') return 'Mrs. Rickett';
  return coach;
}

function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function renderTeachers() {
  const PRIORITY_ORDER = { urgent: 0, overdue: 1, needs: 2 };
  const badgeLabel = { urgent: '🔴 Urgent', overdue: '🟠 Overdue', needs: '🟡 Needs attention' };
  const cardClass  = { urgent: 'tc-urgent', overdue: 'tc-overdue', needs: 'tc-needs' };

  // Always keep urgent/overdue/needs at top, then apply secondary sort
  const withPriority = state.teachers.map(t => ({
    t,
    p: PRIORITY_ORDER[getTeacherPriority(t).level] ?? 99
  }));

  const secondarySort = (a, b) => {
    if (teacherSortMode === 'firstName')  return a.t.name.split(' ')[0].localeCompare(b.t.name.split(' ')[0]);
    if (teacherSortMode === 'lastName')   return (a.t.name.split(' ').pop()).localeCompare(b.t.name.split(' ').pop());
    if (teacherSortMode === 'goal')       return parseInt(a.t.currentGoal||1) - parseInt(b.t.currentGoal||1);
    if (teacherSortMode === 'coach')      return (a.t.primaryCoach||'').localeCompare(b.t.primaryCoach||'');
    if (teacherSortMode === 'gradeBand')  return (a.t.gradeBand||'').localeCompare(b.t.gradeBand||'');
    // default priority: already sorted
    return 0;
  };

  const sorted = withPriority
    .sort((a, b) => a.p !== b.p ? a.p - b.p : secondarySort(a, b))
    .map(x => x.t);

  function teacherCard(t) {
    const tObs = state.observations.filter(o => o.teacherId == t.id);
    const last = tObs[tObs.length - 1];
    const avail = isAvailableNow(t);
    const closing = isWindowClosingSoon(t);
    const goals = GOALS[t.gradeBand] || [];
    const goalObj = goals.find(g => g.id === parseInt(t.currentGoal || 1));
    const { level, reasons } = getTeacherPriority(t);
    const extra = level ? cardClass[level] : '';
    const stepsHTML = goals.map(g =>
      '<div class="gp-step ' + (g.id < parseInt(t.currentGoal||1) ? 'done' : g.id === parseInt(t.currentGoal||1) ? 'current' : '') + '"></div>'
    ).join('');
    return '<div class="teacher-card ' + extra + '" onclick="viewTeacher(\'' + t.id + '\')">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
      +   '<div class="tc-name">' + t.name + (isFlaggedTeacher(t.id) ? ' <span style="font-size:11px;background:#fef2f2;color:#dc2626;padding:1px 6px;border-radius:99px;font-weight:800">🚨</span>' : '') + '</div>'
      +   '<div style="display:flex;align-items:center;gap:6px">'
      +     (closing ? '<span style="font-size:11px;font-weight:800;color:#ea580c;font-family:Nunito,sans-serif">⚡</span>' : '')
      +     '<span class="avail-dot ' + (avail ? 'avail-now' : 'avail-no') + '"></span>'
      +   '</div>'
      + '</div>'
      + (level ? '<div class="priority-badge pb-' + level + '">' + badgeLabel[level] + '</div>' : '')
      + (reasons.length ? '<div style="font-size:11px;color:var(--body);margin-bottom:8px;line-height:1.6">' + reasons.join(' &middot; ') + '</div>' : '')
      + '<div class="tc-meta">' + t.gradeBand + ' · Coach ' + t.primaryCoach + (t.room ? ' · Room ' + t.room : '') + '</div>'
      + '<div class="tc-goal">' + (goalObj ? goalObj.emoji : '') + ' Goal ' + (t.currentGoal || 1) + ': ' + (goalObj ? goalObj.name : '') + '</div>'
      + '<div class="goal-progress" style="margin-top:8px">' + stepsHTML + '</div>'
      + '<div class="tc-stats">'
      +   '<span>' + tObs.length + ' observations</span>'
      +   '<span>' + (last ? fmtDate(last.date) : 'No visits yet') + '</span>'
      + '</div>'
      + '</div>';
  }

  const cardsHTML = sorted.map(teacherCard).join('');

  const sortLabels = { priority: 'Priority', firstName: 'First Name', lastName: 'Last Name', goal: 'Goal', coach: 'Coach', gradeBand: 'Grade Band' };

  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px">'
    + '<div style="display:flex;align-items:center;gap:6px">'
    +   '<span style="font-size:12px;color:var(--muted);font-weight:700">Sort:</span>'
    +   '<select class="form-input" style="font-size:12px;padding:4px 8px;height:auto;width:auto" onchange="teacherSortMode=this.value;render()">'
    +     Object.entries(sortLabels).map(([v,l]) => '<option value="' + v + '"' + (teacherSortMode===v?' selected':'') + '>' + l + '</option>').join('')
    +   '</select>'
    + '</div>'
    + '<button class="btn btn-primary btn-sm" onclick="openAddTeacher()">+ Add Teacher</button>'
    + '</div>'
    + (state.teachers.length === 0
      ? '<div class="card"><div class="empty"><div class="e-icon">👥</div><p>No teachers yet. Add your first teacher to get started.</p></div></div>'
      : '<div class="teacher-grid">' + cardsHTML + '</div>');
}

function renderGoalReadiness(teacherId) {
  loadGoalReadiness(teacherId);
  const cache = goalReadinessCache[teacherId];
  const obsCount = state.observations.filter(o => o.teacherId == teacherId && !o.missed).length;
  if (!cache && obsCount < 3) return '';
  if (!cache || cache.loading) return '<div style="font-size:12px;color:var(--muted);margin-top:8px;font-style:italic">&#129302; Assessing goal readiness...</div>';
  if (!cache.text) return '';
  const isReady    = cache.text.startsWith('Ready');
  const isProgress = cache.text.startsWith('Showing');
  const bg     = isReady ? '#f0fdf4' : isProgress ? '#fefce8' : '#fef2f2';
  const color  = isReady ? '#15803d' : isProgress ? '#854d0e' : '#9f1239';
  const border = isReady ? '#bbf7d0' : isProgress ? '#fde68a' : '#fecdd3';
  return '<div style="margin-top:10px;padding:8px 12px;border-radius:10px;border:1.5px solid ' + border + ';background:' + bg + ';font-size:13px;font-weight:600;color:' + color + '">&#129302; ' + cache.text + '</div>';
}

function renderLookForHistory(lookForResponses, goalObj) {
  if (!lookForResponses) return '';
  let responses = lookForResponses;
  if (typeof responses === 'string') {
    try { responses = JSON.parse(responses); } catch(e) { return ''; }
  }
  const keys = Object.keys(responses);
  if (!keys.length) return '';
  const goalLFs = goalObj ? goalObj.lookFors : [];
  let rows = '';
  keys.forEach(function(k) {
    const val = responses[k];
    const label = goalLFs[parseInt(k)] || ('Look-for ' + (parseInt(k)+1));
    const color = val === 'Yes' ? '#15803d' : val === 'Partial' ? '#b45309' : '#dc2626';
    const bg    = val === 'Yes' ? '#f0fdf4' : val === 'Partial' ? '#fffbeb' : '#fef2f2';
    const icon  = val === 'Yes' ? '✅' : val === 'Partial' ? '〽️' : '❌';
    rows += '<div style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12px">'
      + '<span style="background:' + bg + ';color:' + color + ';font-weight:800;padding:1px 7px;border-radius:99px;white-space:nowrap;flex-shrink:0">' + icon + ' ' + val + '</span>'
      + '<span style="color:var(--body);line-height:1.4">' + label + '</span>'
      + '</div>';
  });
  return '<div style="margin:8px 0 4px;border-top:1px solid var(--border);padding-top:8px">' + rows + '</div>';
}

// ── ANALYTICS ──────────────────────────────────────────
function renderAnalytics() {
  // Privacy name map
  const nameMap = {};
  if (privacyMode) {
    [...state.teachers].sort((a,b) => a.name.localeCompare(b.name))
      .forEach((t, i) => { nameMap[t.id] = 'Teacher ' + String.fromCharCode(65 + i); });
  }
  const displayName = (id, fallback) => privacyMode ? (nameMap[id] || 'Teacher ?') : (fallback || 'Unknown');

  const realObs = state.observations.filter(o => !o.missed && o.impression !== 'Missed visit');
  const total = realObs.length;
  const today = toDateStr(new Date());
  const thisWeek = realObs.filter(o => isThisWeek(o.date)).length;
  const thisMonth = realObs.filter(o => daysSince(o.date) <= 30).length;

  // Goal distribution
  const goalCounts = {};
  realObs.forEach(o => {
    const k = 'Goal ' + o.goalNumber;
    goalCounts[k] = (goalCounts[k] || 0) + 1;
  });
  const goalSorted = Object.entries(goalCounts).sort((a,b) => b[1]-a[1]);
  const maxGoalCount = goalSorted[0] ? goalSorted[0][1] : 1;

  // Coach distribution
  const coachCounts = {};
  realObs.forEach(o => { coachCounts[o.coach] = (coachCounts[o.coach]||0)+1; });
  const maxCoachCount = coachCounts ? Math.max(...Object.values(coachCounts), 1) : 1;

  // Impression breakdown
  const impCounts = { 'Strong start': 0, 'On track': 0, 'Support needed': 0 };
  realObs.forEach(o => { if (impCounts[o.impression] !== undefined) impCounts[o.impression]++; });
  const strongPct  = total ? Math.round(impCounts['Strong start'] / total * 100) : 0;
  const onPct      = total ? Math.round(impCounts['On track'] / total * 100) : 0;
  const supportPct = total ? Math.round(impCounts['Support needed'] / total * 100) : 0;

  // Most improved: teacher whose impression trend has gone UP last 2 obs
  let mostImproved = null;
  state.teachers.forEach(t => {
    const tObs = realObs.filter(o => o.teacherId == t.id)
      .sort((a,b) => new Date(a.date) - new Date(b.date));
    if (tObs.length >= 2) {
      const prev = IMPRESSION_SCORE[tObs[tObs.length-2].impression] || 2;
      const curr = IMPRESSION_SCORE[tObs[tObs.length-1].impression] || 2;
      if (curr > prev) mostImproved = t;
    }
  });

  // Most common look-for gap across ALL teachers/goals
  const lfGaps = {};
  realObs.forEach(o => {
    if (!o.lookForResponses) return;
    let r = o.lookForResponses;
    if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e) { return; } }
    const goals = GOALS[state.teachers.find(t => t.id == o.teacherId)?.gradeBand] || [];
    const goal = goals.find(g => g.id === parseInt(o.goalNumber));
    if (!goal) return;
    Object.entries(r).forEach(([idx, val]) => {
      if (val === 'No') {
        const lf = goal.lookFors[parseInt(idx)] || ('Look-for ' + idx);
        lfGaps[lf] = (lfGaps[lf] || 0) + 1;
      }
    });
  });
  const topGaps = Object.entries(lfGaps).sort((a,b) => b[1]-a[1]).slice(0,3);

  // Teachers at each goal level
  const goalLevelCounts = {};
  state.teachers.forEach(t => {
    const g = 'Goal ' + (t.currentGoal || 1);
    goalLevelCounts[g] = (goalLevelCounts[g] || 0) + 1;
  });
  const goalLevelSorted = Object.entries(goalLevelCounts).sort((a,b) => {
    return parseInt(a[0].split(' ')[1]) - parseInt(b[0].split(' ')[1]);
  });

  // Need attention
  const noVisit14 = state.teachers.filter(t => {
    const tObs = realObs.filter(o => o.teacherId == t.id);
    if (!tObs.length) return true;
    const last = tObs.sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    return daysSince(last.date) > 14;
  });

  // Missed visit count
  const missedCount = state.observations.filter(o => o.missed || o.impression === 'Missed visit').length;

  // Build AI narrative — multiple sentences
  const insights = [];
  if (total >= 5) {
    if (supportPct >= 30) insights.push('⚠️ ' + supportPct + '% of observations are "Support needed" — consider whether caseloads or goals need adjustment.');
    else if (strongPct >= 40) insights.push('💪 ' + strongPct + '% of observations are "Strong start" — your teachers are making real progress.');
    if (mostImproved) insights.push('📈 ' + displayName(mostImproved.id, mostImproved.name) + ' is trending up — great recent momentum worth celebrating.');
    if (topGaps.length > 0) insights.push('🔍 Most common gap across all classrooms: "' + topGaps[0][0] + '" (' + topGaps[0][1] + ' times). This may warrant a team PD focus.');
    if (goalSorted[0]) {
      const topGoalNum = parseInt(goalSorted[0][0].replace('Goal ',''));
      const goals = GOALS['K-2 UFLI'] || [];
      const goalObj = goals.find(g => g.id === topGoalNum);
      insights.push('📊 Most observed goal: ' + goalSorted[0][0] + (goalObj ? ' (' + goalObj.name + ')' : '') + ' with ' + goalSorted[0][1] + ' visits.');
    }
    if (noVisit14.length > 0) insights.push('⏰ ' + noVisit14.length + ' teacher' + (noVisit14.length > 1 ? 's have' : ' has') + ' not been visited in 14+ days.');
    if (missedCount > 0) insights.push('✗ ' + missedCount + ' missed visit' + (missedCount > 1 ? 's' : '') + ' logged — worth checking if patterns exist (testing schedules, etc).');
  }
  const insightHTML = total < 5
    ? '<div class="ic-text">Build your baseline — after 5+ observations you will see patterns here.</div>'
    : insights.map(s => '<div class="ic-text" style="margin-bottom:8px">' + s + '</div>').join('');

  return `
    <div style="font-family:Nunito,sans-serif;font-size:13px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px">Friday Newsletter</div>

    <div class="card" style="border-left:4px solid #6366f1">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:800;font-family:Nunito,sans-serif;color:#4338ca">📰 Weekly Summary Generator</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">AI-generated newsletter ready to paste into your Monday email</div>
        </div>
        <button class="btn btn-sm" style="background:#eef2ff;color:#4338ca;flex-shrink:0;font-weight:800"
          onclick="generateNewsletter()" ${newsletterCache.loading ? 'disabled' : ''}>
          ${newsletterCache.loading ? '✨ Writing...' : '✨ Generate'}
        </button>
      </div>
      ${newsletterCache.loading
        ? '<div style="font-size:13px;color:#6366f1;font-style:italic;padding:12px 0">Generating your weekly summary...</div>'
        : newsletterCache.text
          ? '<textarea id="newsletter-text" readonly style="width:100%;min-height:260px;border:1px solid #c7d2fe;border-radius:10px;padding:14px;font-size:13px;line-height:1.7;font-family:Nunito,sans-serif;resize:vertical;background:#fafafa;color:var(--body)">' + newsletterCache.text + '</textarea>'
            + '<button class="btn btn-primary btn-full" style="margin-top:8px;background:#6366f1;border-color:#6366f1" onclick="copyNewsletter()">📋 Copy to Clipboard</button>'
          : '<div style="font-size:13px;color:var(--muted);padding:8px 0">Tap Generate on Friday afternoon to create your Monday newsletter summary.</div>'
      }
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;margin-top:4px">
      <div style="font-family:Nunito,sans-serif;font-size:13px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.7px">Overview</div>

function addWindow() {
  const container = document.getElementById('tf-windows');
  if (!container) return;
  const rows = container.querySelectorAll('[id^="win-row-"]');
  if (rows.length >= 4) { alert('Maximum 4 windows'); return; }
  const i = rows.length;
  const div = document.createElement('div');
  div.className = 'form-row';
  div.style.cssText = 'margin-bottom:6px;align-items:center';
  div.id = 'win-row-' + i;
  div.innerHTML = '<div class="form-group" style="margin-bottom:0"><input class="form-input" type="time" id="tf-win-start-' + i + '"></div>'
    + '<div style="padding:0 4px;color:var(--muted);font-weight:700;flex-shrink:0">to</div>'
    + '<div class="form-group" style="margin-bottom:0"><input class="form-input" type="time" id="tf-win-end-' + i + '"></div>'
    + '<button type="button" onclick="removeWindow(' + i + ')" style="background:none;border:none;color:#dc2626;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px">×</button>';
  container.appendChild(div);
}

function removeWindow(i) {
  const row = document.getElementById('win-row-' + i);
  if (row) row.remove();
}

function collectWindows() {
  const windows = [];
  const container = document.getElementById('tf-windows');
  if (!container) return windows;
  const rows = container.querySelectorAll('[id^="win-row-"]');
  rows.forEach(row => {
    const idx = row.id.replace('win-row-', '');
    const s = document.getElementById('tf-win-start-' + idx);
    const e = document.getElementById('tf-win-end-' + idx);
    if (s && e && s.value && e.value) {
      windows.push({ start: s.value, end: e.value });
    }
  });
  return windows;
}

function toggleDay(day, el) {
  if (!teacherForm.availableDays) teacherForm.availableDays = [];
  const idx = teacherForm.availableDays.indexOf(day);
  if (idx > -1) { teacherForm.availableDays.splice(idx,1); el.classList.remove('on'); }
  else { teacherForm.availableDays.push(day); el.classList.add('on'); }
}

async function saveTeacher(isEdit) {
  const name = document.getElementById('tf-name').value.trim();
  if (!name) { alert('Name is required'); return; }
  const data = {
    id: isEdit ? teacherForm.id : Date.now().toString(),
    name,
    greeting: document.getElementById('tf-greeting').value,
    room: document.getElementById('tf-room').value.trim(),
    email: document.getElementById('tf-email').value.trim(),
    gradeBand: document.getElementById('tf-band').value,
    primaryCoach: document.getElementById('tf-coach').value,
    currentGoal: isEdit ? parseInt(document.getElementById('tf-goal').value) : 1,
    availabilityWindows: collectWindows(),
    availabilityStart: collectWindows()[0]?.start || '',
    availabilityEnd: collectWindows()[0]?.end || '',
    availableDays: (teacherForm.availableDays||[]).join(','),
    status: 'active',
    createdAt: isEdit ? teacherForm.createdAt : new Date().toISOString()
  };
  if (isEdit) {
    const idx = state.teachers.findIndex(t => t.id == data.id);
    state.teachers[idx] = data;
    if (USE_SHEETS) { showSync('Saving…'); await apiPost('updateTeacher', data); showSync('✓ Saved'); }
  } else {
    state.teachers.push(data);
    if (USE_SHEETS) { showSync('Saving…'); await apiPost('saveTeacher', data); showSync('✓ Saved'); }
  }
  localSave();
  closeModalDirect();
  render();
}

// Plan Visit modal
async function deleteTeacher(id) {
  const t = state.teachers.find(x => x.id == id);
  if (!t) return;
  if (!confirm(`Delete ${t.name}? This won't delete their observations, but they'll be removed from the teacher list.`)) return;
  state.teachers = state.teachers.filter(x => x.id != id);
  if (USE_SHEETS) {
    // Mark as deleted in sheet by updating status
    await apiPost('updateTeacher', { ...t, status: 'deleted' });
    showSync('✓ Teacher removed');
  }
  localSave();
  state.viewingTeacher = null;
  render();
}


const EMAIL_OPENERS = [
  "Thanks for letting me pop in today!",
  "It was so great catching your class this morning.",
  "I really enjoyed stopping by today.",
  "Thank you for the warm welcome during my visit!",
  "What a great snapshot of your work — thanks for having me.",
  "I loved what I got to see during my visit today.",
  "Thanks for always making me feel welcome in your classroom.",
  "It was a treat getting to stop in and see your students in action.",
  "I appreciate you letting me observe today — great things happening in your room.",
  "Thanks for having me — I always leave your classroom inspired."
];

// Cycle openers per teacher so the same one never repeats back-to-back
// Stored as teacherId -> last index used
const openerIndex = {};

function getOpener(teacherId) {
  const last = openerIndex[teacherId] !== undefined ? openerIndex[teacherId] : -1;
  let next = (last + 1) % EMAIL_OPENERS.length;
  openerIndex[teacherId] = next;
  return EMAIL_OPENERS[next];
}

async function submitObservation() {
  // Prevent double-save
  const saveBtn = document.querySelector('.btn-primary[onclick="submitObservation()"]');
  if (saveBtn) { if (saveBtn.disabled) return; saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }
  const glow = document.getElementById('obsGlow')?.value || obsForm.glow || '';
  const grow = document.getElementById('obsGrow')?.value || obsForm.grow || '';
  if (!state.selectedTeacherId || !glow || !grow) {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save & Preview Email'; }
    alert('Please fill in the teacher, glow, and grow fields.'); return;
  }
  const teacher = state.teachers.find(t => t.id == state.selectedTeacherId);
  const goals = GOALS[teacher.gradeBand] || [];
  const goalNum = parseInt(teacher.currentGoal || 1);
  const goal = goals.find(g => g.id === goalNum);

  const obs = {
    id: Date.now().toString(),
    teacherId: teacher.id,
    teacherName: teacher.name,
    coach: state.currentCoach,
    date: document.getElementById('obsDate')?.value || obsForm.date || toDateStr(new Date()),
    goalNumber: goalNum,
    lookForResponses: obsForm.lookFors || {},
    impression: obsForm.impression || 'On track',
    glow, grow,
    coachNotes: document.getElementById('obsCoachNotes')?.value || obsForm.coachNotes || '',
    followUpNeeded: document.getElementById('followUp')?.checked || obsForm.followUpNeeded || false,
    createdAt: new Date().toISOString()
  };

  // Auto-clear previous flag if this new observation doesn't re-flag
  if (!obs.followUpNeeded) {
    const prev = state.observations
      .filter(o => o.teacherId == obs.teacherId && !o.missed)
      .sort((a,b) => new Date(b.date)-new Date(a.date))[0];
    if (prev && (prev.followUpNeeded === true || prev.followUpNeeded === 'TRUE')) {
      prev.followUpNeeded = false;
      if (USE_SHEETS) { await apiPost('updateObservation', prev); }
    }
  }
  // Generate AI coaching note and pre-fill into obs.coachNotes if empty
  if (!obs.coachNotes) {
    showSync('Generating coaching note...');
    const aiNote = await generateObsSummary(obs, teacher, goal);
    if (aiNote) { obs.coachNotes = aiNote; }
  }

  state.observations.push(obs);
  if (USE_SHEETS) { showSync('Saving...'); await apiPost('saveObservation', obs); showSync('✓ Saved to Sheets'); }
  localSave();

  // Email preview — greeting + last name, signed by coach
  const lastName = teacher.name.trim().split(' ').pop();
  const greeting = teacher.greeting || 'Ms.';
  const formalName = greeting + ' ' + lastName;
  const emailPreview = `📧 EMAIL TO: ${teacher.name}${teacher.email ? ' <'+teacher.email+'>' : ''}
From / CC: ${fmtCoachTitle(state.currentCoach)}

Subject: Quick Visit — ${fmtDate(obs.date)}

Hi ${formalName},

${getOpener(teacher.id)}

🌟 What I noticed working well:
${glow}

🎯 One tiny thing to try next time:
${grow}

📍 You're currently working on:
${goal ? goal.emoji + ' Goal ' + goal.id + ' — ' + goal.name : 'Goal ' + goalNum}

Keep up the great work!

— ${fmtCoachTitle(state.currentCoach)}`;

  showEmailModal(emailPreview, obs.id);

  state.selectedTeacherId = null;
  obsForm = {};
  switchTab('dashboard');
}

function buildEmail(obsId) {
  const obs = state.observations.find(o => o.id == obsId);
  if (!obs) return '';
  const teacher = state.teachers.find(t => t.id == obs.teacherId);
  if (!teacher) return '';
  const goals = GOALS[teacher.gradeBand] || [];
  const goalNum = parseInt(obs.goalNumber || 1);
  const goal = goals.find(g => g.id === goalNum);
  const lastName = teacher.name.trim().split(' ').pop();
  const greeting = teacher.greeting || 'Ms.';
  const formalName = greeting + ' ' + lastName;
  return `Hi ${formalName},

${getOpener(teacher.id)}

🌟 What I noticed working well:
${obs.glow}

🎯 One tiny thing to try next time:
${obs.grow}

📍 You're currently working on:
${goal ? goal.emoji + ' Goal ' + goal.id + ' — ' + goal.name : 'Goal ' + goalNum}

Keep up the great work!

— ${fmtCoachTitle(obs.coach)}`;
}

function showEmailModal(emailText, obsId) {
  // emailText can be the full debug header version or just the body
  // We always show a clean copy-friendly version
  const body = obsId ? buildEmail(obsId) : emailText;
  const obs = obsId ? state.observations.find(o => o.id == obsId) : null;
  const teacher = obs ? state.teachers.find(t => t.id == obs.teacherId) : null;
  const subject = obs ? `Quick Visit — ${fmtDate(obs.date)}` : 'Quick Visit';
  const toLine = teacher ? `${teacher.name}${teacher.email ? ' <' + teacher.email + '>' : ''}` : '';

  openModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">📧 Coaching Email</div>
      <button class="btn btn-sm btn-primary" onclick="copyEmail('email-body-text')" style="display:flex;align-items:center;gap:6px">
        📋 Copy
      </button>
    </div>
    ${toLine ? `<div style="font-size:12px;color:var(--muted);margin-bottom:4px"><b>To:</b> ${toLine}</div>` : ''}
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px"><b>Subject:</b> ${subject}</div>
    <textarea id="email-body-text" readonly
      style="width:100%;min-height:280px;border:1px solid var(--border);border-radius:10px;padding:14px;
             font-size:13px;line-height:1.6;font-family:'Nunito',sans-serif;resize:vertical;
             background:#fafafa;color:var(--body)"
    >${body}</textarea>
    <button class="btn btn-primary btn-full" style="margin-top:12px" onclick="copyEmail('email-body-text')">
      📋 Copy to Clipboard
    </button>
    ${teacher?.email ? `
    <a href="mailto:${teacher.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}"
       class="btn btn-secondary btn-full" style="margin-top:8px;display:block;text-align:center;text-decoration:none">
      ✉️ Open in Mail App
    </a>` : ''}
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="closeModalDirect()">Close</button>
  `);
}

function copyEmail(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  el.select();
  el.setSelectionRange(0, 99999);
  try {
    navigator.clipboard.writeText(el.value).then(() => {
      showSync('✓ Copied to clipboard!');
    }).catch(() => {
      document.execCommand('copy');
      showSync('✓ Copied!');
    });
  } catch(e) {
    document.execCommand('copy');
    showSync('✓ Copied!');
  }
}

async function advanceGoal() {
  if (!state.selectedTeacherId) return;
  advanceGoalFor(state.selectedTeacherId);
}

async function advanceGoalFor(teacherId) {
  const t = state.teachers.find(x => x.id == teacherId);
  if (!t) return;
  const goals = GOALS[t.gradeBand] || [];
  const next = parseInt(t.currentGoal || 1) + 1;
  if (next > goals.length) { alert('Teacher has completed all goals! You can add custom goals beyond Goal 6.'); return; }
  if (!confirm(`Advance ${t.name} to Goal ${next}?`)) return;
  t.currentGoal = next;
  if (USE_SHEETS) { await apiPost('updateTeacher', t); showSync('✓ Goal advanced'); }
  localSave();
  render();
}

        <option>Testing in progress</option>
        <option>Running small groups</option>
        <option>Teacher absent</option>
        <option>Class absent / field trip</option>
        <option>Substitute present</option>
        <option>Not a good time — will reschedule</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <input class="form-input" id="missed-notes" placeholder="Any additional context…">
    </div>
    <button class="btn btn-primary btn-full" onclick="saveMissedVisit('${t.id}')">Log & Close</button>
    <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="closeModalDirect()">Cancel</button>
  `);
}

async function saveMissedVisit(teacherId) {
  const t = state.teachers.find(x => x.id == teacherId);
  if (!t) return;
  const reason = document.getElementById('missed-reason')?.value || 'Could not observe';
  const notes  = document.getElementById('missed-notes')?.value || '';
  const obs = {
    id: Date.now().toString(),
    teacherId: t.id,
    teacherName: t.name,
    coach: state.currentCoach,
    date: toDateStr(new Date()),
    goalNumber: t.currentGoal || 1,
    lookForResponses: {},
    impression: 'Missed visit',
    glow: '',
    grow: '',
    coachNotes: '✗ Could not observe — ' + reason + (notes ? ': ' + notes : ''),
    followUpNeeded: false,
    missed: true,
    createdAt: new Date().toISOString()
  };
  state.observations.push(obs);
  if (USE_SHEETS) { await apiPost('saveObservation', obs); showSync('✓ Logged'); }
  localSave();
  closeModalDirect();
  render();
}

function setLookFor(idx, val) {

function switchTab(tab) {
  state.activeTab = tab;
  state.viewingTeacher = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();

}

function updateNavBadge() {
  const dashBtn = document.querySelector('.nav-btn[data-tab="dashboard"]');
  if (!dashBtn) return;
  const existing = dashBtn.querySelector('.nav-badge');
  if (existing) existing.remove();
  if (state.teachers.length === 0) return;
  const count = computeAlerts().length;
  if (count > 0) {
    const badge = document.createElement('span');
    badge.className = 'nav-badge';
    badge.textContent = count;
    const iconWrap = dashBtn.querySelector('.icon-wrap');
    (iconWrap || dashBtn).appendChild(badge);
  }
}

function viewTeacher(id) {
  state.viewingTeacher = id;
  render();
}

function startOfThisWeek() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 1=Mon ... 6=Sat
  const diff = (day === 0 ? -6 : 1 - day); // roll back to Monday
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  mon.setHours(0, 0, 0, 0);
  return mon;
}

function isThisWeek(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr + 'T00:00:00');
  return d >= startOfThisWeek();
}

function toDateStr(d) {
  return d.toISOString().split('T')[0];
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysSince(dateStr) {
  if (!dateStr) return 999;
  return (Date.now() - new Date(dateStr + 'T12:00:00').getTime()) / 86400000;
}



// ── Impression scoring (used by priority + alerts) ───
const IMPRESSION_SCORE = { 'Strong start': 3, 'On track': 2, 'Support needed': 1 };

// ── Teacher priority scoring ──────────────────────────
function getTeacherPriority(t) {
  // Returns { level: 'urgent'|'overdue'|'needs'|null, reasons: [] }
  const tObs = state.observations
    .filter(o => o.teacherId == t.id)
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  const lastObs = tObs[tObs.length - 1];
  const reasons = [];
  let level = null;

  // Unresolved flag → urgent
  if (lastObs && (lastObs.followUpNeeded === true || lastObs.followUpNeeded === 'TRUE')) {
    const visitsSince = tObs.filter(o => new Date(o.date) > new Date(lastObs.date)).length;
    if (visitsSince === 0) { level = 'urgent'; reasons.push('🚨 Unresolved flag'); }
  }

  // Declining trend → urgent
  if (tObs.length >= 3) {
    const recent = tObs.slice(-3);
    let dec = true;
    for (let i = 1; i < recent.length; i++) {
      if ((IMPRESSION_SCORE[recent[i].impression]||2) >= (IMPRESSION_SCORE[recent[i-1].impression]||2)) { dec = false; break; }
    }
    if (dec) { level = level || 'urgent'; reasons.push('📉 Declining trend'); }
  }

  // Overdue → overdue
  const days = lastObs ? daysSince(lastObs.date) : 999;
  if (days >= 7) {
    level = level || 'overdue';
    reasons.push(`⏰ ${lastObs ? Math.floor(days)+'d since last visit' : 'Never visited'}`);
  }

  // Stuck on goal → needs
  if (tObs.length >= 3) {
    const currentGoal = parseInt(t.currentGoal || 1);
    const onGoal = tObs.filter(o => parseInt(o.goalNumber) === currentGoal).length;
    if (onGoal >= 3) { level = level || 'needs'; reasons.push(`🔄 ${onGoal} obs on Goal ${currentGoal}`); }
  }

  // Repeated look-for No → needs
  if (tObs.length >= 2 && !reasons.find(r => r.startsWith('🔍'))) {
    const recentObs = tObs.slice(-4);
    const currentGoal = parseInt(t.currentGoal || 1);
    const goalObj = (GOALS[t.gradeBand]||[]).find(g => g.id === currentGoal);
    if (goalObj) {
      goalObj.lookFors.forEach((lf, idx) => {
        const resps = recentObs.map(o => {
          const r = o.lookForResponses;
          if (!r) return null;
          return typeof r === 'string' ? JSON.parse(r)[idx] : r[idx];
        }).filter(Boolean);
        if (resps.filter(r => r === 'No').length >= 2) {
          level = level || 'needs';
          reasons.push(`🔍 Gap: "${lf.length > 30 ? lf.slice(0,30)+'…' : lf}"`);
        }
      });
    }
  }

  return { level, reasons };
}

// ── Window closing soon (within 15 mins, not yet visited this week) ──────────
function isWindowClosingSoon(t) {
  const windows = getTeacherWindows(t);
  if (!windows.length) return false;
  const now = new Date();
  const dayName = DAYS[now.getDay()];
  const days = (t.availableDays || 'Mon,Tue,Wed,Thu,Fri').split(',').map(d => d.trim());
  if (!days.includes(dayName)) return false;
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const closing = windows.some(w => {
    const [eh, em] = w.end.split(':').map(Number);
    const minsLeft = eh * 60 + em - nowMins;
    return minsLeft >= 0 && minsLeft <= 15;
  });
  if (!closing) return false;
  const tObs = state.observations.filter(o => o.teacherId == t.id);
  return !tObs.some(o => daysSince(o.date) <= 7);
}

// ══════════════════════════════════════════════════════
// AI INSIGHTS ENGINE
// ══════════════════════════════════════════════════════
const OVERDUE_DAYS = 14;

function computeAlerts() {
  const alerts = [];

  state.teachers.forEach(t => {
    const tObs = state.observations
      .filter(o => o.teacherId == t.id)
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    const lastObs = tObs[tObs.length - 1];
    const days = lastObs ? daysSince(lastObs.date) : 999;

    // ── 1. Overdue visit (14+ days or never visited) ──
    if (days >= OVERDUE_DAYS) {
      alerts.push({
        type: 'overdue',
        priority: days > 21 ? 0 : 1,
        teacher: t,
        title: `${t.name} — overdue`,
        sub: lastObs
          ? `Last seen ${Math.floor(days)} days ago (${fmtDate(lastObs.date)})`
          : 'Never visited',
        action: 'Observe now',
        onclick: `quickObserve('${t.id}')`
      });
    }

    // ── 2. Unresolved follow-up flag ──────────────────
    if (lastObs && (lastObs.followUpNeeded === true || lastObs.followUpNeeded === 'TRUE')) {
      const revisited = tObs.some(o =>
        new Date(o.date) > new Date(lastObs.date)
      );
      if (!revisited) {
        alerts.push({
          type: 'flag',
          priority: 0,
          teacher: t,
          title: `${t.name} — follow-up needed`,
          sub: `Flagged on ${fmtDate(lastObs.date)}, not yet revisited`,
          action: 'Observe now',
          onclick: `quickObserve('${t.id}')`
        });
      }
    }

    // ── 3. Repeated "No" on same look-for (max 1 per teacher) ──
    if (tObs.length >= 2) {
      const recentObs = tObs.slice(-4);
      const goals = GOALS[t.gradeBand] || [];
      const currentGoal = parseInt(t.currentGoal || 1);
      const goalObj = goals.find(g => g.id === currentGoal);
      if (goalObj) {
        let worstLF = null;
        let worstCount = 0;
        goalObj.lookFors.forEach((lf, idx) => {
          const responses = recentObs.map(o => {
            const r = o.lookForResponses;
            if (!r) return null;
            try {
              return typeof r === 'string' ? JSON.parse(r)[idx] : r[idx];
            } catch(e) { return null; }
          }).filter(Boolean);
          const noCount = responses.filter(r => r === 'No').length;
          if (noCount >= 2 && noCount > worstCount) {
            worstCount = noCount;
            worstLF = lf;
          }
        });
        if (worstLF) {
          alerts.push({
            type: 'lookfor',
            priority: 1,
            teacher: t,
            title: `${t.name} — persistent gap`,
            sub: `"${worstLF}" marked No ${worstCount}x recently`,
            action: 'View teacher',
            onclick: `viewTeacher('${t.id}')`
          });
        }
      }
    }
  });


    alerts.sort((a, b) => a.priority - b.priority);
  return alerts;
}

function renderAlerts() {
  if (state.teachers.length === 0) return '';
  const alerts = computeAlerts();
  const SHOW = 3;

  if (alerts.length === 0) {
    return `<div class="alerts-empty">
      <div class="ae-icon">🌟</div>
      <div>
        <div class="ae-text">All clear — great work!</div>
        <div class="ae-sub">No overdue visits, flags, or declining trends right now.</div>
      </div>
    </div>`;
  }

  const typeClass = { overdue:'alert-overdue', stuck:'alert-stuck', decline:'alert-decline', lookfor:'alert-lookfor', schedule:'alert-schedule', flag:'alert-flag' };
  const typeIcon  = { overdue:'⏰', stuck:'🔄', decline:'📉', lookfor:'🔍', schedule:'🗓', flag:'🚨' };

  const visible = alertsExpanded ? alerts : alerts.slice(0, SHOW);
  const hidden  = alerts.length - SHOW;

  return `
    <div class="card" style="padding:16px 18px">
      <div class="collapsible-header" style="margin-bottom:12px">
        <div class="card-title" style="margin-bottom:0">
          🧠 Alerts
          <span class="alert-badge">${alerts.length}</span>
        </div>
      </div>
      ${visible.map(a => `
        <div class="alert-card ${typeClass[a.type]}" onclick="${a.onclick}">
          <div class="alert-icon">${typeIcon[a.type]}</div>
          <div class="alert-body">
            <div class="alert-title">${a.title}</div>
            <div class="alert-sub">${a.sub}</div>
            <div class="alert-action">${a.action} →</div>
          </div>
        </div>
      `).join('')}
      ${!alertsExpanded && hidden > 0
        ? `<button class="btn btn-secondary btn-sm btn-full" style="margin-top:4px" onclick="alertsExpanded=true;render()">Show ${hidden} more alert${hidden>1?'s':''} ▼</button>`
        : alerts.length > SHOW
          ? `<button class="btn btn-ghost btn-sm btn-full" style="margin-top:4px" onclick="alertsExpanded=false;render()">Show less ▲</button>`
          : ''
      }
    </div>
  `;
}
